name: Test PHP simple

on: push
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  dire-bonjour:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Bonjour !"

  test-php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Installer dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Debug arborescence
        run: ls -R

      - name: Lancer PHPUnit directement
        run: composer run test

  deployer:
    runs-on: ubuntu-latest
    needs: test-php
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Préparer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Isoler page.html dans un dossier temporaire
        run: |
          mkdir deploy
          cp page.html deploy/

      - name: Uploader uniquement page.html
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'  # ✅ dossier temporaire avec page.html uniquement

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4