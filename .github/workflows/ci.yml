name: Test Selenium
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Installer dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Lancer le serveur PHP
        run: php -S 0.0.0.0:8000 -t . > /dev/null 2>&1 &

      # ✅ Selenium lancé directement comme processus, pas comme service Docker
      - name: Lancer Selenium
        run: |
          docker run -d \
            --name selenium \
            --network host \
            --shm-size=2gb \
            selenium/standalone-chrome
          echo "Selenium lancé avec --network host"

      - name: Attendre Selenium
        run: |
          echo "Attente Selenium..."
          until curl -s http://localhost:4444 > /dev/null; do
            echo "pas encore prêt..."
            sleep 2
          done
          echo "✅ Selenium est prêt !"

      - name: 🔍 Vérifier Selenium
        run: curl -s http://localhost:4444/status

      - name: Lancer les tests
        run: composer run test