name: Test Selenium
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      selenium:
        image: selenium/standalone-chrome
        ports:
          - 4444:4444
        options: >-
          --shm-size=2gb
          --add-host=host.docker.internal:host-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Installer dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Lancer le serveur PHP
        run: php -S 0.0.0.0:8000 -t . > /dev/null 2>&1 &

      - name: Attendre Selenium
        run: until curl -s http://localhost:4444 > /dev/null; do sleep 2; done

      - name: 🔍 Tester les URLs Selenium
        run: |
          echo "=== Test http://localhost:4444 ==="
          curl -s http://localhost:4444 | head -c 200
          echo ""
          echo "=== Test http://localhost:4444/wd/hub/status ==="
          curl -s http://localhost:4444/wd/hub/status | head -c 200
          echo ""
          echo "=== Test http://localhost:4444/status ==="
          curl -s http://localhost:4444/status | head -c 200

      - name: Lancer les tests
        run: SELENIUM_URL=http://localhost:4444 vendor/bin/phpunit tests --verbose