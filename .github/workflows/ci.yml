name: CI PHP

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      selenium:
        image: selenium/standalone-chrome
        ports:
          - 4444:4444
        options: >-
          --health-cmd="curl -f http://localhost:4444/status || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Installer dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Vérifier Selenium
        run: |
          curl -fsS http://127.0.0.1:4444/status
          curl -fsS http://127.0.0.1:4444/status | jq .

      - name: Lancer le serveur PHP
        run: php -S 0.0.0.0:8000 -t . > /dev/null 2>&1 &

      - name: Vérifier le serveur PHP
        run: |
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8000 && exit 0
            sleep 1
          done
          exit 1

      - name: Lancer les tests
        run: composer run test
        env:
          SELENIUM_URL: http://127.0.0.1:4444
          APP_URL: http://127.0.0.1:8000