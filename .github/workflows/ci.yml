name: Test Selenium
on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Installer dépendances
        run: composer install --no-interaction --prefer-dist

      - name: Lancer le serveur PHP
        run: php -S 0.0.0.0:8000 -t . > /dev/null 2>&1 &

      # ✅ Démarre Chrome + Selenium directement sur la machine, sans Docker
      - name: Démarrer ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+' | head -1)
          echo "Version Chrome : $CHROME_VERSION"
          chromedriver --port=4444 --whitelisted-ips='' &
          sleep 3
          echo "✅ ChromeDriver démarré"

      - name: 🔍 Vérifier ChromeDriver
        run: curl -s http://localhost:4444/status

      - name: Lancer les tests
        run: composer run test